# Mirrors main to a Hugging Face Space on every push, triggering a rebuild.
#
# One-time setup in your GitHub repo:
#   Settings → Secrets and variables → Actions
#     - Secret   HF_TOKEN      : a Hugging Face *write* access token
#     - Variable HF_USERNAME   : your HF username (e.g. jane-doe)
#     - Variable HF_SPACE_NAME : your Space name (e.g. resumeblog)
name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force \
            "https://${{ vars.HF_USERNAME }}:$HF_TOKEN@huggingface.co/spaces/${{ vars.HF_USERNAME }}/${{ vars.HF_SPACE_NAME }}" \
            main
